- generic [ref=e2]: "<?xml version=\"1.0\" encoding=\"UTF-8\"?> <rss version=\"2.0\" xmlns:atom=\"http://www.w3.org/2005/Atom\"> <channel> <title>Vietnam Launchpad Blog</title> <link>https://www.vietnamlaunchpad.com/blog</link> <description>Expert guides and insights for expats living, working, and doing business in Vietnam.</description> <language>en-us</language> <atom:link href=\"https://www.vietnamlaunchpad.com/feed.xml\" rel=\"self\" type=\"application/rss+xml\" /> <lastBuildDate>Sat, 11 Apr 2026 13:28:17 GMT</lastBuildDate> <item> <title>Can You Work on a Marriage TRC in Vietnam? Work Permits Explained</title> <link>https://www.vietnamlaunchpad.com/blog/can-you-work-on-marriage-trc-vietnam</link> <guid isPermaLink=\"true\">https://www.vietnamlaunchpad.com/blog/can-you-work-on-marriage-trc-vietnam</guid> <description>A marriage TRC gives you the right to live in Vietnam long-term - but it does not automatically give you the right to work. Here is what you can and cannot do, and how to get a work permit once you have your marriage TRC.</description> <pubDate>Sat, 11 Apr 2026 00:00:00 GMT</pubDate> <category>Visas & Immigration</category> <author>team@vietnamlaunchpad.com (Vietnam Launchpad Team)</author> </item> <item> <title>Vietnam Golden Visa 2026: What We Know (And What We Don't)</title> <link>https://www.vietnamlaunchpad.com/blog/vietnam-golden-visa-2026-update</link> <guid isPermaLink=\"true\">https://www.vietnamlaunchpad.com/blog/vietnam-golden-visa-2026-update</guid> <description>Vietnam's proposed Golden Visa has been discussed since 2025. As of April 2026, there is still no legislation and no application process. Here is the current status and what long-term expats should do instead.</description> <pubDate>Wed, 01 Apr 2026 00:00:00 GMT</pubDate> <category>Visas & Immigration</category> <author>team@vietnamlaunchpad.com (Vietnam Launchpad Team)</author> </item> <item> <title>Vietnam's New PIT Law 2026: What Changed and What It Means for Expats</title> <link>https://www.vietnamlaunchpad.com/blog/vietnam-pit-law-2026-changes</link> <guid isPermaLink=\"true\">https://www.vietnamlaunchpad.com/blog/vietnam-pit-law-2026-changes</guid> <description>Law No. 109/2025/QH15 brought the biggest personal income tax reforms in Vietnam since 2012. Here is what actually changed, what stayed the same, and what expats need to do now.</description> <pubDate>Thu, 08 Jan 2026 00:00:00 GMT</pubDate> <category>Finance & Tax</category> <author>team@vietnamlaunchpad.com (Vietnam Launchpad Team)</author> </item> <item> <title>How to Convert Your Driver's License in Vietnam: Complete Guide 2026</title> <link>https://www.vietnamlaunchpad.com/blog/how-to-convert-drivers-license-vietnam</link> <guid isPermaLink=\"true\">https://www.vietnamlaunchpad.com/blog/how-to-convert-drivers-license-vietnam</guid> <description>Everything expats need to know about driving legally in Vietnam - from International Driver's Licenses for tourists to full license conversion for TRC holders.</description> <pubDate>Sun, 19 Jan 2025 00:00:00 GMT</pubDate> <category>Living in Vietnam</category> <author>team@vietnamlaunchpad.com (Vietnam Launchpad Team)</author> </item> <item> <title>How to Legally Teach English in Vietnam: Complete Guide for 2026</title> <link>https://www.vietnamlaunchpad.com/blog/how-to-legally-teach-english-in-vietnam</link> <guid isPermaLink=\"true\">https://www.vietnamlaunchpad.com/blog/how-to-legally-teach-english-in-vietnam</guid> <description>Everything you need to know about teaching English legally in Vietnam, from work permits to visa requirements and finding legitimate teaching positions.</description> <pubDate>Thu, 09 Jan 2025 00:00:00 GMT</pubDate> <category>Work Permits</category> <author>team@vietnamlaunchpad.com (Vietnam Launchpad Team)</author> </item> </channel> </rss>"